services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inknowing-app
    ports:
      - "3001:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - CHROMA_URL=http://inknowing-chromadb:8000
    depends_on:
      - chromadb
    restart: unless-stopped
    networks:
      - inknowing_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: inknowing-chromadb
    ports:
      - "8002:8000"
    volumes:
      - ./data/vectors:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
    restart: unless-stopped
    networks:
      - inknowing_network

networks:
  inknowing_network:
    driver: bridge
