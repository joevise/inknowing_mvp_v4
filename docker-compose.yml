version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: inknowing_chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data/vectors:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 网络配置（可选，用于未来扩展）
networks:
  default:
    name: inknowing_network
    driver: bridge