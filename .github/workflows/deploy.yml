name: Deploy InKnowing

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 67.209.190.54
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/inknowing
            git pull origin main
            docker compose up -d --build
            echo "Deployment complete"
